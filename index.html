<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POSN Biology Planner</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-slate-50 text-slate-800 font-sans min-h-screen pb-12">

    <div class="bg-gradient-to-r from-emerald-600 to-teal-500 text-white px-6 py-8 shadow-md rounded-b-3xl sticky top-0 z-50">
        <div class="max-w-md mx-auto">
            <h1 class="text-2xl font-bold flex items-center gap-2">
                <i data-lucide="dna" class="w-7 h-7 animate-pulse"></i>
                สอวน. ชีววิทยา Planner
            </h1>
            <p class="text-emerald-100 text-xs mt-1">บันทึกความคืบหน้าการอ่านหนังสือ (ระบบ Auto-Save)</p>
            
            <div class="mt-5 bg-emerald-950/20 rounded-full p-1 backdrop-blur-xs">
                <div class="flex justify-between text-xs px-2 mb-1 font-semibold text-emerald-50">
                    <span>ความคืบหน้าโดยรวม</span>
                    <span id="progress-text">0%</span>
                </div>
                <div class="w-full bg-emerald-900/30 rounded-full h-3 overflow-hidden">
                    <div id="progress-bar" class="bg-white h-full rounded-full transition-all duration-500 ease-out" style="width: 0%"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="max-w-md mx-auto px-4 mt-6 space-y-4">

        <div class="bg-white p-5 rounded-2xl shadow-xs border border-slate-100">
            <h2 class="font-bold text-slate-900 flex items-center gap-2 border-b border-slate-100 pb-2 mb-3 text-base">
                <i data-lucide="microscope" class="w-5 h-5 text-emerald-600"></i>
                สารชีวโมเลกุลและเซลล์
            </h2>
            <div class="space-y-3">
                <label class="flex items-start gap-3 p-2 rounded-xl hover:bg-slate-50 transition-colors cursor-pointer">
                    <input type="checkbox" id="topic-1" class="todo-checkbox w-5 h-5 rounded-md border-slate-300 text-emerald-600 focus:ring-emerald-500 mt-0.5">
                    <span class="text-sm text-slate-700 leading-tight">สารชีวโมเลกุล (คาร์โบไฮเดรต, โปรตีน, ลิพิด, กรดนิวคลิอิก)</span>
                </label>
                <label class="flex items-start gap-3 p-2 rounded-xl hover:bg-slate-50 transition-colors cursor-pointer">
                    <input type="checkbox" id="topic-2" class="todo-checkbox w-5 h-5 rounded-md border-slate-300 text-emerald-600 focus:ring-emerald-500 mt-0.5">
                    <span class="text-sm text-slate-700 leading-tight">โครงสร้างเซลล์และหน้าที่ของออร์แกเนลล์</span>
                </label>
                <label class="flex items-start gap-3 p-2 rounded-xl hover:bg-slate-50 transition-colors cursor-pointer">
                    <input type="checkbox" id="topic-3" class="todo-checkbox w-5 h-5 rounded-md border-slate-300 text-emerald-600 focus:ring-emerald-500 mt-0.5">
                    <span class="text-sm text-slate-700 leading-tight">การลำเลียงสารผ่านเข้า-ออกจากเซลล์</span>
                </label>
                <label class="flex items-start gap-3 p-2 rounded-xl hover:bg-slate-50 transition-colors cursor-pointer">
                    <input type="checkbox" id="topic-4" class="todo-checkbox w-5 h-5 rounded-md border-slate-300 text-emerald-600 focus:ring-emerald-500 mt-0.5">
                    <span class="text-sm text-slate-700 leading-tight">การหายใจระดับเซลล์และการแบ่งเซลล์</span>
                </label>
            </div>
        </div>

        <div class="bg-white p-5 rounded-2xl shadow-xs border border-slate-100">
            <h2 class="font-bold text-slate-900 flex items-center gap-2 border-b border-slate-100 pb-2 mb-3 text-base">
                <i data-lucide="git-fork" class="w-5 h-5 text-teal-600"></i>
                พันธุศาสตร์ (Genetics)
            </h2>
            <div class="space-y-3">
                <label class="flex items-start gap-3 p-2 rounded-xl hover:bg-slate-50 transition-colors cursor-pointer">
                    <input type="checkbox" id="topic-5" class="todo-checkbox w-5 h-5 rounded-md border-slate-300 text-emerald-600 focus:ring-emerald-500 mt-0.5">
                    <span class="text-sm text-slate-700 leading-tight">การถ่ายทอดลักษณะตามหลักของเมนเดล</span>
                </label>
                <label class="flex items-start gap-3 p-2 rounded-xl hover:bg-slate-50 transition-colors cursor-pointer">
                    <input type="checkbox" id="topic-6" class="todo-checkbox w-5 h-5 rounded-md border-slate-300 text-emerald-600 focus:ring-emerald-500 mt-0.5">
                    <span class="text-sm text-slate-700 leading-tight">โครโมโซมและสารพันธุกรรม (DNA / RNA)</span>
                </label>
                <label class="flex items-start gap-3 p-2 rounded-xl hover:bg-slate-50 transition-colors cursor-pointer">
                    <input type="checkbox" id="topic-7" class="todo-checkbox w-5 h-5 rounded-md border-slate-300 text-emerald-600 focus:ring-emerald-500 mt-0.5">
                    <span class="text-sm text-slate-700 leading-tight">เทคโนโลยีทางดีเอ็นเอและวิวัฒนาการ</span>
                </label>
            </div>
        </div>

        <button id="reset-btn" class="w-full bg-slate-200 text-slate-600 text-sm font-semibold py-3 rounded-xl hover:bg-red-50 hover:text-red-600 transition-colors flex items-center justify-center gap-2 mt-6">
            <i data-lucide="trash-2" class="w-4 h-4"></i>
            ล้างข้อมูลและเริ่มใหม่หมด
        </button>

    </div>

    <script>
        // เริ่มต้นใช้งานระบบไอคอน
        lucide.createIcons();

        const checkboxes = document.querySelectorAll('.todo-checkbox');
        const progressBar = document.getElementById('progress-bar');
        const progressText = document.getElementById('progress-text');
        const resetBtn = document.getElementById('reset-btn');

        // ฟังก์ชันคำนวณความคืบหน้า %
        function updateProgress() {
            const total = checkboxes.length;
            const checkedCount = document.querySelectorAll('.todo-checkbox:checked').length;
            const percentage = total > 0 ? Math.round((checkedCount / total) * 180 / 1.8) : 0; // แปลงค่าเป็นเปอร์เซ็นต์ธรรมดาแบบปลอดภัย
            
            progressBar.style.width = `${percentage}%`;
            progressText.innerText = `${percentage}% (${checkedCount}/${total})`;
        }

        // โหลดข้อมูลเก่าจากความจำมือถือ (ถ้ามี) ตอนเปิดหน้าเว็บขึ้นมาใหม่
        checkboxes.forEach(checkbox => {
            const savedValue = localStorage.getItem(checkbox.id);
            if (savedValue === 'true') {
                checkbox.checked = true;
            }

            // ดักจับการคลิก: เมื่อติ๊กปุ๊บ ให้เซฟลงเครื่องปั๊บ
            checkbox.addEventListener('change', () => {
                localStorage.setItem(checkbox.id, checkbox.checked);
                updateProgress();
            });
        });

        // ปุ่มล้างข้อมูลทั้งหมด
        resetBtn.addEventListener('click', () => {
            if(confirm('คุณต้องการลบเช็กลิสต์ทั้งหมดที่บันทึกไว้ใช่ไหม?')) {
                checkboxes.forEach(checkbox => {
                    checkbox.checked = false;
                    localStorage.removeItem(checkbox.id);
                });
                updateProgress();
            }
        });

        // รันครั้งแรกตอนโหลดหน้าเว็บเสร็จ
        updateProgress();
    </script>
</body>
</html>
